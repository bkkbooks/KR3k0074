body:
  text: 事始三卷事始三卷皇王世皇帝紀曰天地之分有天皇氏也皇帝世皇帝紀曰五帝之初有天皇帝也王世皇帝紀曰三王之初有夏禹車易曰服牛乘馬引重致遠釋名曰黃帝造舟車故曰軒轅氏世本曰奚仲造車謂廣其制度也鸞車禮記曰鸞車有虞氏之輅也鉤車禮記曰鉤車夏后氏之輅也乘輅禮記曰乘輅殷輅也金根車董巴漢輿服志曰秦王作金根車也指南車崔豹古今注曰大駕指南車起於黃帝與蚩尤戰於涿鹿之野兵出天作大霧兵士皆迷於是乃作指南車以示四方樂臺注鬼谷子曰肅慎氏獻白雉還恐惑周公為作指南車以送之述征記曰軍止北門中有指南車車有木仙人持信幡車四西東人恆指南又云管仲所作也輅車李尤大輅車銘曰奚仲本造後裔飾雍車以代步可以從容也相風沈約宋書輿服志曰案周禮無相風此古制愚以為是秦制也華蓋崔豹古今注云黃帝所作也與蚩尤戰常有五色雲在帝上故為華蓋也曲蓋古今注云武王伐紂大風折蓋太公因而為折蓋之形雉尾扇古今注云起於殷高宗周以為王后夫人之服飾也豹尾古今注云周制也旄頭列異傳曰秦文公時梓樹化為牛以騎擊之騎不勝或墜地髻解被牛裹之入水故秦自是以髦頭騎使先驅玄中記曰秦始皇時南山有梓樹大數百圍蔭宮中始皇使三百人披頭以赤絲繞樹伐之因而立髦頭騎旌管子曰舜有進善之旌旌者精也有精光也旗列子曰黃帝與炎帝戰以雕鶡胡葛反鷹鸇為旗幟旃世本曰黃帝作旃説文曰旃曲柄也所以招士衆褒衣董巴漢輿服志曰周公抱成王晏居故施褒衣璽春秋運斗樞曰黃帝為天子黃龍負圖而出圖中有璽章文曰天皇符璽辨世本曰魯昭公所作冕世本曰黃帝作貂蟬戰國策曰趙武靈王好胡服有貂蟬冠秦皇破趙得其冠以賜侍中通天冠蔡雍獨斷曰天子冠秦禮無文漢作竹皮冠履世本曰於則作屝履宋衷曰黃帝臣草曰屝麻皮曰履几李尤几銘序曰軒轅作扇古今注曰五明扇舜所作也書易曰上古結繩而治後世聖人易之以書契聖人謂庖犧氏世本曰沮誦蒼頡造書宋衷曰皆黃帝臣也篆書呂氏春秋曰周宣王史籀造隸書史記曰秦時程邈造草書李延説草書曰漢興有草書不知誰作也禮禮運曰禮本於太一鄭玄六藝論云禮之興蓋與詩同時詩大戴禮曰黃帝樂曰雲門樂章曰詩起自黃帝鄭玄議虞書曰詩言志歌詠言然則詩之為道倣於此乎尚書孔安國序曰斷自唐虞已下迄於周易繫辭曰古者聖人作易注云伏羲也春秋孟子曰魯謂之春秋按此起於周公且孔子修春秋起於隱公時史呂氏春秋曰倉頡作史子劉協文心曰鬻熊作書題為鬻子曆世本曰容成造曆黃帝之臣甲子世本曰大撓作甲子黃帝之臣命令史記曰秦兼天下令曰制制誥釋名曰詔昭暗也以此示之使昭然也蔡雍獨斷曰制誥王者之言必為法制也詔猶告也三代無其文秦漢有焉符魚龍河圖曰玄女出兵符信符黃帝制蚩尤章表漢雜事曰秦初定制改書為奏漢定禮儀則有四品一曰章二曰奏三曰表四曰駁議檄檄者誥誓之流也戰國策曰張儀檄楚始有此名也移劉協文心曰劉歆移太常按此移文所起也啓沈約書云景帝名啓當時俱諱自魏國箋記末方云謹啓議管子曰軒轅有明臺之議賦詩序曰二曰賦然則賦者與詩同起至春秋鄭莊公賦大隧之中見左傳頌詩序曰六曰頌周公作時邁頌見於詩祝文禮記曰伊耆氏始為八蠟以祭八神土反其宅水歸其澤昆蟲無作草木歸其宅是祝文也盟誓尚書禹乃會群后誓於師禮記曰誥誓不及五帝也針文心曰軒轅輿几與弼不逮即為針也銘蔡雍銘論曰黃帝有金人巾几之銘誄周禮曰大夫以上作諡禮記曰魯莊公戰於乘丘士之有誄自此始也碑管子曰無懷氏封泰山刻石紀功按此碑之始也對問史記曰宋玉對楚王問七發文心曰枚乘作七發連珠沈約上連珠表注云始自揚子雲也三言毛詩曰振振鷺鷺于飛鼓淵淵醉言歸四言毛詩曰關關睢鳩五言召南曰誰謂雀無角其成篇起李陵蘇武六言齊風曰俟我于庭乎而七言秦車轔曰交交黃鳥止于棘其成篇起武帝柏梁詩八言節南山曰我不敢效我友自逸烽火黃帝出軍決法曰軍兩散敵地形不便望見烽火也兵世本曰蚩尤作兵宋衷注曰神農臣也甲世本曰興作甲少康子也戈戟呂氏春秋曰蚩尤作五兵五兵者周為戈戟酋殳矛夷矛已具上楯山海經曰羿與鑿齒戰於疇華之野羿持弓矢鑿齒持楯鎧管子曰葛盧之山發黃金蚩尤受之制以為鎧説文曰甲也弓世本曰揮於作弓宋衷曰黃帝臣孫卿子曰倕作弓矢世本曰夷則作矢此黃帝臣弩古史考曰黃帝作弩藥世本曰神農嘗百草以和藥濟人也律風俗通曰皋陶造律史記曰李俚造律也刑罰尚書蚩尤作五虐之刑虞書曰舜作五刑世本曰伯夷作五刑夏作贖刑獄急就篇皋陶造獄釋名曰又為牢也斬尸子曰黃帝斬蚩尤於中冀棄市漢書中元二年改磔曰棄市流尚書曰流四凶族各處四裔徒周禮曰凡民有罪役諸司空云徒也齋戒春秋命戒圖曰黃帝請問太一長生之道太一曰齋戒六丁可成功注云丁取丁寧戒取戒慎社郊特牲曰社祭土而主陰氣也左傳共工氏有子曰句龍為后土也稷孝經云稷五穀之長左傳曰有烈山氏之子曰柱烈山炎帝後也自夏后以上祀之周棄為稷即后稷也唐虞稷官也自商以來祀之今配之也䄍禮記曰伊耆氏始為䄍䄍者索也五祀世本曰殷湯作五祀白虎通曰五祀者門戶井竈中霤也高禖五經要義曰高禖者蓋先王所謂子孫之祀也以玄鳥至之日以太牢祀於高禖注曰高辛氏妃簡狄吞燕卵而生契後王以為禖官故因此而祀之儺禮記曰顓頊氏有二子生而亡去為疫鬼一居江水中為瘧一居人宮室區隅中善驚小兒於是以正歲十二月命祀官方相氏蒙虎皮黃金四目玄衣纁裳執戈揚盾帥隸及童子而時儺以索室毆疫鬼也河伯龍魚河圖曰河伯姓呂名公子夫子姓馮名夷上古聖賢處所記曰馮夷者弘農華陰人也在潼關提道里住服八石得水仙為河伯蔣侯祠搜神記曰蔣子文者廣陵人嗜酒好色自謂青骨死當為神漢末為秣陵尉逐賊至鍾山下為賊擊傷有頃遂死及吳先主之初其故吏見子文於道頭乘白馬執白羽從如平生謂吏曰我當王此土神以福爾下民爾可宣告百姓為立祠孫權知之於是使者封子文為中都侯次弟緒為長水校尉啓母祠帝王世紀曰陽城有啓母祠漢元鼎元年武帝東巡中嶽見啓母為百姓尊之至今猶存也稷丘君列仙傳曰稷丘君者太山下道士武帝為立祠虞子英祠列仙傳曰子英舒鄉人善入水捕魚得赤鯉養長丈餘魚言汝上我背與魚俱升天數歲歸來見妻子魚復來迎吳中門戶作神魚子英祠徐君廟異苑曰吳郡有徐君廟所居左右為劫盜非法者便如拘縛終至被執清溪小姑廟異苑曰是蔣侯第三妹梅姑廟異苑曰丹陽湖側有梅姑廟生時有道術能著履行水上壻怒殺之投尸水中乃流至廟處即時有方頭漆棺在祠堂下晦日望之時見水霧中有形廟左右不敢取魚射獵茅山廟山謙之南徐州記曰延陵縣南有茅山漢帝時咸陽人茅盈及固並得道之處石侯祠搜神記曰豫章縣有高山峻石仰之絶脰俗名石侯祠赤松子廟異苑曰赤松子於此縣得仙乃立廟諸侯王漢書云帝世子封王號曰諸侯王比古之諸侯也三公傅子曰黃帝以風后配中台五聖配下台為三公也丞相漢書曰秦官司徒管子曰黃帝得祝融南方故使為司徒也大司馬春秋斗運樞曰黃帝大司馬容光也太尉河圖録運法曰堯坐舟中與太尉舜觀鳳凰漢書曰太尉秦官也司空左傳曰鳲鳩氏為司空也按鳲鳩少昊也尚書令續漢書曰秦置漢元鼎二年以張安世為尚書令任安亦為之尚書僕射漢書曰僕射秦官也古者武官有僕射以督課之自侍中尚書博士官皆有之獻帝時始置左右僕射中書監令漢書曰孝武帝遊宴後宮以宦者掌尚書事改為中書謁者置僕射充宦者之職皆曰中書監令魏志曰黃初中改祕書為中書監令侍中環濟要略曰侍中古官也風后為黃帝侍中周時號為常伯漢書曰侍中秦官皆得入禁黃門侍郎漢書給事黃門侍郎皆秦官也中書侍郎漢官儀曰漢置中書領尚書事太師史記曰周成王為天子以太公望為太師太傅大戴禮曰昔成王幼周公為太傅太保大戴禮曰成王以召公為太保三孤尚書曰少師少傅少保曰三孤卿尚書曰天子五服孔安國云五服天子諸侯卿大夫士之服按此卿始於唐虞太常卿尚書秩宗周禮宗伯秦曰奉常景帝六年更曰太常卿光祿勳一人漢書曰秦曰郎中令武帝太初元年改曰光祿勳也廷尉卿漢書曰秦官也大理宗正漢書曰景帝中改廷尉為大理宗正衛尉卿漢書曰秦官也執金吾漢書曰秦名中尉武帝太初元年更名執金吾大司農漢書曰秦治粟內史景帝改為大司農令武帝名大司農少府卿漢書曰秦官也太僕卿應劭曰周穆王所置也將作少匠漢書曰將作少府景帝更為將作匠大鴻臚漢書曰秦曰典客武帝名大鴻臚廷尉平漢書曰宣帝置御史大夫漢書曰秦官也御史中丞漢書曰秦官也開府儀同三司東觀漢記曰劉隱延平元年拜儀同三司號自隱始也司隸校尉漢書曰周官也武帝依周置之治書御史漢書曰宣帝元鳳中置御史周禮曰惟王建國立御史也侍御史漢官儀曰侍御史周官也大夫虞書曰天命有德五服五章哉孔安國曰與卿同也太中大夫漢書曰秦官也諫議大夫漢書曰武帝元狩五年置國子祭酒應劭漢官儀曰漢置國子博士晉中興書曰晉武帝置博士漢書曰秦官也五經博士漢書曰武帝建元元年置國子助教晉書曰晉孝武帝太元十年置祕書監東觀漢記曰桓帝延熹二年置祕書丞魏志曰武帝置祕書左右丞著作郎沈約宋書曰著作郎後漢官漢已來但掌天文律曆其國記撰述悉在著作後漢東觀有著作郎太子詹事應劭漢官儀曰詹事秦官也太子僕沈約宋書曰秦官也童子郎續漢書曰左雄秦徵海內名士使公卿子弟為諸生能通春秋者奏拜曰童子郎謁者僕射應劭漢官儀曰秦官也都水使者王隱晉書曰太康五年置掌舟楫咨議參軍晉書曰元皇帝改軍咨祭酒為之録事參軍干寶司徒議曰漢魏無此官録事職掌總録衆曹之文按此晉置也王國太傅續漢書曰傅一人漢初立也王友晉書曰武帝太始三年為樂安王監燕王幾各置友一人諸王文學漢書曰武帝詔郡國舉文學書策通一藝補文學太農續漢書曰漢置太農僕射桓帝改曰太農散騎常侍應劭漢官儀曰秦置散騎中常侍魏改散騎常侍通直散騎常侍晉書曰太始十年詔東平王懋為員外常侍通直殿中散騎侍郎魏志曰文帝延康元年置通直散騎侍郎晉起居注曰大興元年置將軍應劭漢官儀曰周官也驃騎將軍漢書曰武帝元狩三年置車騎將軍應劭漢官儀曰漢置之衛軍將軍漢儀注曰漢置文帝十四年遣衛將軍周長吉撫軍魏志曰魏武帝置征南征北將軍後漢書曰漢光武建武二年置鎮南鎮北將軍魏書曰魏武帝建安年中置安東安西安北將軍魏書曰黃初太和中置東觀漢記曰漢獻帝世置後漢書曰光武二年置祭遵為之安南將軍後漢書曰光武三年置征虜將軍後漢書曰光武二年置以祭遵為之冠軍將軍漢書曰武帝置以霍去病為之中壘校尉漢書曰武帝置中領軍魏略曰魏延康中置護軍將軍漢書曰平帝元始元年置護軍都尉漢書曰秦官也中護軍魏略曰武帝置驍騎將軍漢書曰漢官也武帝以李廣為之衛尉漢書曰秦官也五官中郎將漢官儀曰秦官也五校尉長騎越騎步兵長水射聲漢書曰武帝初置虎賁中郎將尚書曰虎賁三百人按此武王置漢書曰平帝元始元年置中郎將期門郎漢書曰武帝建元三年置羽林監漢官儀曰孝武太初元年置穴從僕射續漢書曰桓帝元嘉三年置前後左右將軍漢書曰周官也城門校尉環氏要略曰漢高祖置州牧尚書咨十有二牧刺史山謙之丹陽記曰漢武帝元豐五年置郡守秦始皇三十六年滅六國置三十六郡守太守景帝中和二年改郡守為太守令長丞尉漢書曰秦掌治縣萬戶為長皆有丞尉九錫韓詩外傳曰諸侯之有德天子錫之一錫車馬二錫衣服三錫虎賁四錫樂器五錫納陛六錫朱戶七錫弓矢八錫鈇鉞九錫秬鬯為之九錫此起自周代也殷史記曰殷本於簡狄吞乙卵生契孟子曰湯居毫與葛伯為鄰在梁國寧陵縣周史記曰周本於薑嫄履大人迹生后稷漢書曰周在扶風美陽縣也秦史記曰本起於非子為周王養馬於秦隴漢書曰隴西地名也晉史記曰周成王封母弟叔虞於晉杜預曰在平陽絳邑縣東也杞史記曰武王克商封夏後東樓公於杞云本都陳留雍丘也宋史記曰武王克商封殷後比干子於宋杜預曰宋今梁國睢陽縣也曹史記曰武王封子振鐸於曹杜預云今濟陽定陶縣也虢史記曰周封虢叔於虢杜預云虢國今弘農陝縣東是也魯史記曰成王封周公於魯漢書曰魯在少昊之墟曲阜之地衛史記曰周公封弟康叔於衛杜預曰在汲郡朝歌縣也鄭史記曰周宣王封母弟友於鄭在滎陽苑陵縣西南舊鄭在京兆韓史記曰武王之子封於韓豳史記曰后稷曾孫公劉所封之國杜預云在扶風陝縣燕史記曰周成王封召公奭於燕杜預云燕國今在薊縣趙史記曰周宣王封造父之孫公仲於趙至簡子與六卿分晉而有之楚史記曰周封鬻熊於荊後號楚杜預云南郡江陵縣地南城也吳史記曰周封泰伯於吳按今常州無錫縣也陳史記曰周武王封胡公滿於陳杜預云今陳國陳縣蔡史記曰周封文王子蔡叔於蔡孔安國云圻內蔡邑也杜預云今汝南上蔡虞史記曰周封虞仲於虞杜預云今河東太陽縣魏春秋曰晉封畢萬於魏杜預云今河北魏縣居處上古巢居而穴處後世聖人易之以宮室城世本曰鯀作城禹父也郭世本曰鯀作郭鄉周禮曰地官司徒曰五州五鄉市古史曰神農作市屋易曰上古穴居而野處後世聖人易之以宮室聖人伏羲也宮已具上文又帝王世紀曰紂作離宮高千尺室世本曰禹作宮室臺紀年書曰桀作瑤臺高千尺稱呂氏春秋曰黃帝使伶倫造權權謂稱也度同上伶倫作度度者丈尺也量同上伶倫因律為量量升斛也衣裳易曰黃帝垂衣裳而治天下呂氏春秋曰胡曹作也裙古人已有裙八幅直縫乘騎至唐初馬周以五幅為之交解裁之寬於八幅也笄趙襄子之姊嫁北代王襄子殺北代王其姊磨笄自刎故有磨笄山幞頭古人以皂羅三尺裹頭號頭巾後周武帝為四腳依用三尺至唐朝馬周解為之用一尺八寸靴釋名曰本胡服也趙武靈王所作鞋古人以草為屨皮為履後唐馬周始以麻為之即鞋也甲乙帳漢武故事上以琉璃珠夜光珠雜天下珠寶為甲帳其次為乙帳甲者居神乙者自居布帛禮運曰昔者先王未有絲麻後世聖人治絲麻以為布帛注伏羲也錢漢書曰太公為周立九府圜法李奇曰即錢也穀賈誼新書曰神農教人食穀耕周書曰神農之時天雨粟神農耕而種之耒耜古史曰神農作世本曰垂作樓犁魏略曰皇甫陽為燉煌太守教民作樓犁火世本曰自燧人鑽木造火飯周書曰黃帝始蒸穀為飯糜粥周書曰黃帝蒸穀取米以為粥鹽世本曰夙沙氏煮海為鹽神農臣也酒呂氏春秋曰儀狄造酒戰國策曰帝女儀狄造酒進之於禹酒池陸韜曰殷紂作酒池可以回船也肉林糟丘史記曰紂設糟丘肉林射世本曰逢蒙作射宋衷云逢蒙學射於羿黃帝時已有射此言作者為改制也御易繫辭曰服牛乘馬引重致遠以利天下蓋取諸隨世本曰鯀作服牛相土作乘馬臅作駕宋衷曰三人黃帝臣也韓衷作御宋衷曰韓衷侯也有御書尚矣此復言作者加精巧也書世本曰蒼頡作書字黃帝史淮南子曰蒼頡造書字而天雨粟鬼夜哭説文曰蒼頡之初作書蓋依貌象形故謂之文後形聲相益謂之字字者孳乳浸多者也數周禮曰教國子有九數九數方田粟米之類紙漢書曰後漢閹蔡倫典上方將漁網麻頭始造紙也筆博物志曰舜造圍棋堯子丹朱喜之後封於房博世本曰鳥曹作六博説文曰十二棋也摴蒱博物志曰老子入胡作摴蒱用以卜蹴踘劉向別録曰博物志言黃帝所作或曰起戰國時世説曰黃帝蹴兵勢所以練武士也彈棋世説曰始自魏宮內戲也魏文帝於此技好之用巾拂之無不中者長行局魏時曹植字子建始造雙陸局取兄弟之義藏鉤辛氏三秦記曰漢昭帝母藏弋手拳而有國色武帝寵之藏鉤此始也假髻晉中興書曰徵祥記曰太元中宮主婦女緩鬢傾髻以為盛飾豐多可恆戴乃先於籠上裝之名曰假髻也粉博物志曰紂作粉魏略曰何晏動靜手不離粉鏡玄中記曰尹壽作鏡堯之臣蟠龍叉古今注曰梁冀婦所製歌舞山海經曰帝俊八子是始為歌舞風俗通曰漢靈好胡舞舞衣尚書曰胤之舞衣孔安國曰胤國舞衣中法度鼓吹蔡雍禮志曰鼓吹岐伯所作以揚其德也琴世本曰神農作廣雅曰伏羲氏琴長七尺二寸上有五絃瑟世本曰庖羲氏作史記曰天帝使素女鼓五十絃瑟悲帝禁之不止改其瑟二十五絃山海經云帝俊生晏龍始為瑟也箏風俗通曰箏五絃笻身今并梁二州箏形如瑟十二絃不知誰改也或曰蒙恬所造也箜篌釋曰師涓所作靡靡之樂蓋空國之候淫聲也史記曰今上祠太一后土始用樂箜篌自此起續漢書曰靈帝作箜篌鐘山海經云炎帝之孫伯陵因鼓遂為鐘世本曰倕作磬世本曰毋句作磬尚書泗濱浮磬簨簴禮記曰夏后氏之簨簴植曰簨橫曰簴用懸鐘磬也鼓禮記曰土鼓簣桴葦籥伊耆氏之樂也注伊耆氏古天子號呂氏春秋曰帝嚳令倕作鼓鞞陸機鼓吹賦云原鼓吹之始蓋稟命於黃軒角國儉角賦云黃帝會群臣於泰山作清角之音鐸鬻子曰禹之治天下也宣人事者振鐸鞞呂氏春秋曰倕作鞞鞞鼓節也鼗呂氏春秋曰帝嚳使倕作鼗鼓簫風俗通曰舜作簫禮記曰女媧氏作笙釋曰笙以匏為之十二管有簧世本曰女媧氏作簧竽世本曰隨作竽宋衷曰隨女媧臣箎世本曰蘇成公作箎宋衷曰周平王時諸侯也古史曰古有箎尚矣蘇成公善箎而記者因以為作謬矣笛風俗通曰漢武時丘仲所作周禮笛師掌吹笛言丘仲非也塤周禮小師均教吹塤世本曰商辛作宋衷曰商辛周平王之諸侯香罏西京雜記曰長安巧手丁緩作臥褥香爐一名被中香罏本出房風為機環轉運四周而爐體常平可置之被褥也胡床風俗通曰靈王好胡服景帝作胡床又紂作玉床食器韓子曰舜作食器黑漆其上禹作祭器黑漆其外朱畫其內史記曰舜作竹器於壽丘鼎鍾繇上疏曰黃帝鑄三鼎簠簋禮記曰周之簠簋瑚璉明堂位曰夏后氏四璉殷之六瑚俎豆禮記曰俎豆有虞氏以梡夏后氏以嶡殷以椇周以房俎豆夏后氏以楬豆殷玉豆周獻豆勺禮記曰夏后氏以龍勺殷以疏勺周以蒲勺釜易説卦曰坤為釜古史黃帝造釜甑古史曰黃帝作斧周書曰神農作鋸古史曰孟莊子作鋸管子曰軍中必有一斧一鋸鑿古史曰孟莊子作箕帚世本曰夏少康作瓦古史曰夏世昆吾氏作瓦屋也甎古史曰夏世鳥曹氏作甎也井博物志曰伯益作井磑世本曰公輸般作石磑銚世本曰倕作銚冶尸子曰蚩尤作陶周書神農耕而作陶尸子曰昆吾作陶舂世本曰雍文作舂是黃帝臣呂氏春秋曰赤冀作杵臼杵易曰黃帝斷木為杵掘地為臼世本曰雍文造也獵尸子曰伏羲氏教人以獵漁尸子曰燧人之世天下多水教人以漁網古史曰庖羲氏觀蒙面作網世本曰句芒作網宋衷曰句芒庖羲臣廣雅曰魚網也羅世本曰句芒作羅可以取鳥鉤列子曰詹何以獨繭絲為綸芒針為鉤荊蓧為竿剖粒為餌引盈車之魚於百仞之泉舟楫易曰黃帝刳木為舟剡木為楫華表古今注曰堯設誹謗之木今之華表也棒曹操傳曰曹操為洛陽北部尉始建五色棒有犯禁者不避豪強皆棒煞也棺槨易曰古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺槨聖人黃帝也瓦棺古史曰舜作瓦棺堲古史曰舜作土堲以周棺也挽歌漢高祖召田橫至尸鄉自斃從者不敢哭之而不勝其哀故以此寄哀者翣世本曰武王作古史曰周公作面衣風俗通曰吳王夫差羞見子胥以帛幕面而死後人以為常則也箸世本曰殷王象箸玉杯也
